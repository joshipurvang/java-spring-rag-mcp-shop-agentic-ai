server.port=8080

# Ollama
# Run first: ollama pull llama3.2 && ollama pull nomic-embed-text
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Redis Vector Store (RAG)
# Run: docker run -d -p 6379:6379 redis/redis-stack:latest
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.ai.vectorstore.redis.index=shop-products
spring.ai.vectorstore.redis.prefix=product:
spring.ai.vectorstore.redis.initialize-schema=true

# MCP Server
# Tools are exposed at:
#   SSE stream:    GET  http://localhost:8080/sse
#   Message send:  POST http://localhost:8080/mcp/message
# Connect Claude Desktop by adding this server URL to its config.
spring.ai.mcp.server.name=shop-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# Logging
logging.level.com.demo=DEBUG
logging.level.org.springframework.ai=INFO
